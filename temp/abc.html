<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen's Hill Urban Planning - Traffic Solution</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 18px;
            border-radius: 12px;
            pointer-events: none;
            max-width: 280px;
            border-left: 4px solid #00d4ff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        #controls-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        button {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-problem { background: #ff4757; color: white; }
        .btn-solution { background: #00d4ff; color: white; }
        button:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .active { outline: 2px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        #legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
        }
        .status-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 8px;
            text-transform: uppercase;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div id="info-panel">
    <h3 style="margin:0 0 5px 0; color:#00d4ff;">Queen's Hill Solution</h3>
    <p id="scenario-desc" style="line-height:1.4; margin-bottom: 12px;">Lung Ma Road is the only exit. A single accident here can paralyze the entire community.</p >
    
    <div id="status-box" style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
        <div id="traffic-light" class="status-tag" style="background:#ff4757;">🔴 Bottleneck Detected</div>
        <div style="margin-top:8px; font-size:12px; opacity: 0.9;">
            <b>Road:</b> <span id="use-case">2-Lane Rural</span><br>
            <b>Risk:</b> <span id="target-zone">Total Blockage</span>
        </div>
    </div>
</div>

<div id="legend">
    <div><span style="color:#ff4757;">■</span> Gridlock</div>
    <div><span style="color:#2ed573;">■</span> Flowing</div>
    <div><span style="color:#ffa500;">■</span> Logistics</div>
</div>

<div id="controls-ui">
    <button id="btnProblem" class="btn-problem active" onclick="updateScenario('problem')">Problem</button>
    <button id="btnSolution" class="btn-solution" onclick="updateScenario('solution')">Overpass Solution</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, vehicles = [];
let currentScenario = 'problem';
let lungMaRoad, overpass, pillars = [], cycleLanes = [];
let accidentVehicle;

const MIN_FOLLOW_DISTANCE = 14; 
const BUFFER_DISTANCE = 7;      
const BASE_SPEED = 0.28; 

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(80, 55, 90);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(50, 100, 50);
    light.castShadow = true;
    scene.add(light);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshPhongMaterial({ color: 0x111111 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    createInfrastructure();
    spawnTraffic();

    let isMouseDown = false;
    document.addEventListener('mousedown', () => isMouseDown = true);
    document.addEventListener('mouseup', () => isMouseDown = false);
    document.addEventListener('mousemove', (e) => {
        if (isMouseDown) scene.rotation.y += e.movementX * 0.005;
    });

    window.addEventListener('resize', onWindowResize, false);
    animate();
}

function createInfrastructure() {
    const roadMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
    
    lungMaRoad = new THREE.Mesh(new THREE.BoxGeometry(16, 0.2, 280), roadMat);
    lungMaRoad.position.set(0, 0.1, 10);
    scene.add(lungMaRoad);

    overpass = new THREE.Mesh(new THREE.BoxGeometry(300, 1.0, 24), roadMat);
    overpass.position.set(0, 12, -30);
    scene.add(overpass);

    const medianMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const median = new THREE.Mesh(new THREE.BoxGeometry(300, 1.1, 0.5), medianMat);
    median.position.set(0, 12, -30);
    scene.add(median);

    const cycleMat = new THREE.MeshPhongMaterial({ color: 0x00d4ff });
    for(let side of [-1, 1]) {
        const lane = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 280), cycleMat);
        lane.position.set(side * 10, 0.15, 10);
        scene.add(lane);
        cycleLanes.push(lane);
    }

    const pGeo = new THREE.CylinderGeometry(1.5, 1.5, 12, 16);
    const pMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
    for(let x of [-35, 35]) {
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.set(x, 6, -30);
        scene.add(p);
        pillars.push(p);
    }
}

function createVehicle(type, color) {
    const group = new THREE.Group();
    if (type === 'truck') {
        const cab = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 1.5), new THREE.MeshPhongMaterial({ color: 0xdddddd }));
        cab.position.set(0, 0.6, 1.5);
        group.add(cab);
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 4), new THREE.MeshPhongMaterial({ color: color }));
        trailer.position.set(0, 0.9, -1);
        group.add(trailer);
    } else {
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 3), new THREE.MeshPhongMaterial({ color: color }));
        group.add(body);
        const roof = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.6), new THREE.MeshPhongMaterial({ color: 0xffffff }));
        roof.position.set(0, 0.7, 0.2); 
        group.add(roof);
    }
    return group;group
}

function spawnTraffic() {
    vehicles.forEach(v => scene.remove(v.mesh));
    if(accidentVehicle) scene.remove(accidentVehicle);
    vehicles = [];

    const isProblem = currentScenario === 'problem';
    
    if(isProblem) {
        accidentVehicle = createVehicle('car', 0x555555);
        // The accident is positioned in a way that blocks both narrow lanes in 'problem' mode
        accidentVehicle.position.set(0, 0.6, -20);
        accidentVehicle.rotation.y = Math.PI * 1.25; 
        scene.add(accidentVehicle);
    }

    const count = isProblem ? 20 : 45; 
    const laneChoices = isProblem ? [-2.5, 2.5] : [-6, -2, 2, 6];
    
    for(let i = 0; i < count; i++) {
        let vType = 'car';
        let vColor = isProblem ? 0xff4757 : 0x2ed573;
        
        if (!isProblem && Math.random() > 0.75) {
            vType = 'truck';
            vColor = 0xffa500; 
        }

        const vMesh = createVehicle(vType, vColor);
        const onOverpass = !isProblem && (Math.random() > 0.5); 
        let direction = 1; 
        
        if (onOverpass) {
            direction = Math.random() > 0.5 ? 1 : -1;
            const laneZ = direction === 1 ? -25 : -35; 
            vMesh.position.set((Math.random() - 0.5) * 280, 13, laneZ); 
            vMesh.rotation.y = direction === 1 ? -Math.PI / 2 : Math.PI / 2;
        } else {
            const side = laneChoices[Math.floor(Math.random() * laneChoices.length)];
            vMesh.position.set(side, 0.6, -130 - (i * 15)); 
            vMesh.rotation.y = 0; 
        }

        scene.add(vMesh);
        vehicles.push({
            mesh: vMesh,
            baseSpeed: isProblem ? 0.12 : BASE_SPEED + (Math.random() * 0.05), 
            onOverpass: onOverpass,
            direction: direction,
            lastSpeed: 0,
            type: vType
        });
    }
}

function updateScenario(type) {
    currentScenario = type;
    
    document.getElementById('btnProblem').classList.toggle('active', type === 'problem');
    document.getElementById('btnSolution').classList.toggle('active', type === 'solution');

    const desc = document.getElementById('scenario-desc');
    const light = document.getElementById('traffic-light');
    const useCase = document.getElementById('use-case');
    const target = document.getElementById('target-zone');

    if(type === 'problem') {
        desc.innerHTML = "<b>The Problem:</b> Bottleneck on Lung Ma Road. One accident causes a <b>total block</b> for thousands.";
        light.style.background = "#ff4757"; light.innerHTML = "🔴 System Failure";
        useCase.innerHTML = "2-Lane Bottleneck";
        target.innerHTML = "Total Blockage";
        overpass.visible = false;
        pillars.forEach(p => p.visible = false);
        cycleLanes.forEach(l => l.visible = false);
        lungMaRoad.scale.x = 0.5;
    } else {
        desc.innerHTML = "<b>The Solution:</b> Multi-level overpass links Queen's Hill directly to highway networks in both directions.";
        light.style.background = "#2ed573"; light.innerHTML = "🟢 Resilient Flow";
        useCase.innerHTML = "Two-Way Overpass";
        target.innerHTML = "Dual Highway Link";
        overpass.visible = true;
        pillars.forEach(p => p.visible = true);
        cycleLanes.forEach(l => l.visible = true);
        lungMaRoad.scale.x = 1.3;
    }
    spawnTraffic();
}

function animate() {
    requestAnimationFrame(animate);
    
    const groundVehicles = vehicles.filter(v => !v.onOverpass).sort((a, b) => a.mesh.position.z - b.mesh.position.z);
    const overpassVehicles = vehicles.filter(v => v.onOverpass);

    vehicles.forEach((v) => {
        let currentSpeed = v.baseSpeed;

        if (v.onOverpass) {
            const frontOnBridge = overpassVehicles.find(o => 
                o !== v &&
                o.direction === v.direction &&
                (v.direction === 1 ? (o.mesh.position.x < v.mesh.position.x) : (o.mesh.position.x > v.mesh.position.x)) &&
                Math.abs(o.mesh.position.x - v.mesh.position.x) < MIN_FOLLOW_DISTANCE
            );
            
            if(frontOnBridge) {
                const dist = Math.abs(frontOnBridge.mesh.position.x - v.mesh.position.x);
                if (dist < BUFFER_DISTANCE) {
                    currentSpeed = 0;
                } else {
                    currentSpeed = Math.min(currentSpeed, frontOnBridge.lastSpeed * 0.9);
                }
            }
            
            v.mesh.position.x -= currentSpeed * v.direction;
            v.lastSpeed = currentSpeed;
            
            if (v.direction === 1 && v.mesh.position.x < -150) v.mesh.position.x = 150;
            if (v.direction === -1 && v.mesh.position.x > 150) v.mesh.position.x = -150;
            
        } else {
            // FIX: Check for accident block for ALL lanes in problem mode
            if (currentScenario === 'problem' && accidentVehicle) {
                const distToAccident = accidentVehicle.position.z - v.mesh.position.z;
                // If car is behind the accident and getting close
                if (distToAccident > 0 && distToAccident < MIN_FOLLOW_DISTANCE) {
                    if (distToAccident < BUFFER_DISTANCE) {
                        currentSpeed = 0;
                    } else {
                        currentSpeed = Math.min(currentSpeed, (distToAccident / MIN_FOLLOW_DISTANCE) * 0.1);
                    }
                }
            }

            // Ground road collision detection (check cars in front in same lane)
            const frontCar = groundVehicles.find(other => 
                other !== v && 
                other.mesh.position.z > v.mesh.position.z && 
                Math.abs(other.mesh.position.x - v.mesh.position.x) < 2.0 && 
                (other.mesh.position.z - v.mesh.position.z) < MIN_FOLLOW_DISTANCE 
            );

            if (frontCar) {
                const gap = frontCar.mesh.position.z - v.mesh.position.z;
                if (gap < BUFFER_DISTANCE) {
                    currentSpeed = 0;
                } else {
                    currentSpeed = Math.min(currentSpeed, frontCar.lastSpeed);
                }
            }

            v.mesh.position.z += currentSpeed;
            v.lastSpeed = currentSpeed;

            if (v.mesh.position.z > 140) {
                const laneChoices = currentScenario === 'problem' ? [-2.5, 2.5] : [-6, -2, 2, 6];
                v.mesh.position.x = laneChoices[Math.floor(Math.random() * laneChoices.length)];
                v.mesh.position.z = -140;
                v.lastSpeed = v.baseSpeed; 
            }
        }
    });
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

window.onload = () => {
    init();
    updateScenario('problem');
};
</script>
</body>
</html>
