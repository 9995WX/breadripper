<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verified DUMB, Congratulations!</title>
  <link rel="icon" type="image/x-icon" href="/dumb.png" />

  <style>
    @font-face {
      font-family: 'font';
      src: url('font.ttf');
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'font', sans-serif;
      background-color: #e8eaef;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #001f3f;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      animation: fadeOut 1s ease-in-out forwards;
      animation-delay: 2s;
    }

    #loading-screen h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 60%;
      height: 20px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background-color: #ffcc00;
      animation: fillBar 2s forwards;
    }

    @keyframes fillBar {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* Certificate */
    .certificate {
      position: relative;
      width: 1000px;
      height: 647px;
      background-color: white;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      display: none;
      animation: fadeIn 0.8s ease-out forwards;
    }

    .background-decor {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .triangle-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-top: 647px solid #001f3f;
      border-right: 200px solid transparent;
    }

    .triangle-left-gold {
      position: absolute;
      top: 0;
      left: 40px;
      width: 0;
      height: 0;
      border-top: 647px solid #ffcc00;
      border-right: 20px solid transparent;
    }

    .triangle-right {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      border-bottom: 100px solid #001f3f;
      border-left: 1000px solid transparent;
    }

    .triangle-right-gold {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      border-bottom: 10px solid #ffcc00;
      border-left: 1000px solid transparent;
    }

    .text-layer {
      position: absolute;
      top: 20%;
      width: 100%;
      text-align: center;
      padding: 0 50px;
      z-index: 1;
      color: #001f3f;
    }

    .text-layer h1 {
      font-size: 3.5em;
      margin: 0;
    }

    .text-layer h2 {
      font-size: 2em;
      margin: 0.5em 0;
      color: #ffcc00;
    }

    .text-layer p {
      font-size: 1.2em;
      color: #222;
    }

    .ip {
      font-size: 1.5em;
      margin-top: 1em;
      color: #333;
    }

    .footer {
      position: absolute;
      bottom: 60px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      font-size: 1em;
      z-index: 1;
    }

    /* Added image styling */
    .bottom-left-img {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 200px;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <h1>Making your certificate...</h1>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Certificate -->
  <div class="certificate" id="cert">
    <div class="background-decor">
      <div class="triangle-left"></div>
      <div class="triangle-left-gold"></div>
      <div class="triangle-right"></div>
      <div class="triangle-right-gold"></div>
    </div>

    <div class="text-layer">
      <h1>Certificate</h1>
      <h2>Of Verified DUMB!</h2>
      <p>This certificate is proudly awarded to:</p>
      <h2 style="color: darkblue;">You</h2>
      <div class="ip" id="ip">Loading your IP...</div>
    </div>

    <div class="footer" style="bottom: 160px;">
      <div>Date: <span id="date"></span></div>
      <div>Signature: DUMB Authority</div>
    </div>

    <!-- Added image -->
    <img class="bottom-left-img" src="https://tool.lu/netcard/" alt="Netcard image">
  </div>

  <script>
    // Set IP
    fetch('https://api.ipify.org?format=json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('ip').textContent = `IP Address: ${data.ip}`;
      })
      .catch(() => {
        document.getElementById('ip').textContent = 'IP Address: Unavailable';
      });

    // Set date
    const today = new Date();
    document.getElementById('date').textContent = today.toLocaleDateString();

    // Show certificate after loading
    setTimeout(() => {
      document.getElementById('cert').style.display = 'block';
    }, 2000);
  </script>

</body>
</html>
