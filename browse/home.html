<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Page</title>
    <base target="_top">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
        }

        .search-container {
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.4); /* Darker glass for better contrast */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-form {
            display: flex;
            gap: 12px;
        }

        .search-input {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 1.1rem;
        }

        .search-button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background-color: #00a1f1;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .search-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="search-container">
        <form action="https://www.bing.com/search" method="GET" class="search-form">
            <input 
                type="text" 
                name="q" 
                class="search-input" 
                placeholder="Search Bing..." 
                required
            >
            <button type="submit" class="search-button">Search</button>
        </form>
    </div>

</body>
</html>
